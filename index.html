<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messenger</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  }

  html, body {
    height: 100%;
    overflow: hidden; /* 🚫 полностью убрали скролл */
    position: fixed;
    width: 100%;
  }

  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    position: relative;
    height: 100vh;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: 0.35s ease;
  }

  .screen.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .subtext {
    font-size: 13px;
    color: #777;
    margin-bottom: 18px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #2f80ed, #56ccf2);
    color: white;
    font-size: 16px;
  }

  .btn:active {
    transform: scale(0.97);
  }

  /* PHONE */
  .phone-wrap {
    width: 100%;
    position: relative;
  }

  .prefix {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #2f80ed;
    font-weight: 600;
    font-size: 18px;
  }

  .phone-input {
    width: 100%;
    padding: 16px 16px 16px 55px;
    font-size: 18px;

    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #f5f5f5;
    outline: none;
  }

  .phone-input:focus {
    background: #fff;
    border-color: #2f80ed;
    box-shadow: 0 0 0 4px rgba(47,128,237,0.15);
  }

  .error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* CODE */
  .code-box {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .code-box input {
    width: 48px;
    height: 58px;
    font-size: 22px;
    text-align: center;

    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #f5f5f5;

    outline: none;
  }

  .code-box input:focus {
    transform: scale(1.08);
    border-color: #2f80ed;
    box-shadow: 0 0 0 4px rgba(47,128,237,0.15);
    background: #fff;
  }

</style>
</head>

<body>

<div class="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="s1">
    <h1>Добро пожаловать</h1>
    <p class="subtext">Современный мессенджер</p>
    <button class="btn" onclick="go('s2')">Войти</button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="s2">

    <h1>Введите номер</h1>
    <p class="subtext">На него придёт код</p>

    <div class="phone-wrap">
      <div class="prefix">+7</div>
      <input id="phone" class="phone-input" type="tel" inputmode="numeric" placeholder="987 654 32 10"/>
    </div>

    <div class="error" id="err"></div>

    <button class="btn" style="margin-top:20px" onclick="check()">Продолжить</button>
  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="s3">

    <h1 id="codeTitle">Отправили код</h1>
    <p class="subtext">Если не получили СМС, проверьте чат "Коды подтверждения"</p>

    <div class="code-box">
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1"/>
    </div>

    <button class="btn" style="margin-top:20px">Подтвердить</button>
  </div>

</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === 's3'){
    document.getElementById('codeTitle').innerText =
      'Отправили код на +7 ' + window.userPhone;
  }
}

/* PHONE */
const phone = document.getElementById('phone');
const err = document.getElementById('err');

function format(v){
  v = v.replace(/\D/g,'').slice(0,10);

  let r = [];
  if(v.length>0) r.push(v.slice(0,3));
  if(v.length>3) r.push(v.slice(3,6));
  if(v.length>6) r.push(v.slice(6,8));
  if(v.length>8) r.push(v.slice(8,10));

  return r.join(' ');
}

phone.addEventListener('input',()=>{
  phone.value = format(phone.value);
  err.style.display = 'none';
});

function check(){
  const v = phone.value.replace(/\D/g,'');

  if(v.length !== 10){
    err.style.display = 'block';
    err.textContent = 'Введите 10 цифр номера';
    return;
  }

  if(v[0] !== '9'){
    err.style.display = 'block';
    err.textContent = 'Номер должен начинаться с 9';
    return;
  }

  window.userPhone = phone.value;
  go('s3');
}

/* CODE */
document.querySelectorAll('.code-box input').forEach((el,i,arr)=>{
  el.addEventListener('input',()=>{
    el.value = el.value.replace(/\D/g,'');
    if(el.value && i < arr.length-1) arr[i+1].focus();
  });

  el.addEventListener('keydown',(e)=>{
    if(e.key==="Backspace" && !el.value && i>0){
      arr[i-1].focus();
    }
  });
});
</script>

</body>
</html>
